<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Upload | FastAPI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; text-align: center; }
        form { padding: 8px 16px; background: #007bff; color: #fff; border-radius: 10px; cursor: pointer; display: inline-block; }
        input { margin: 10px; }
        button { background: lightskyblue; }
        button:hover { background-color: blue; }
        .msg { margin-top: 15px; color: green; }
        .a { display: block; margin-top: 25px; color: #337ab7; }
    </style>
</head>
<body>
    <h2>Background Upload (Non-blocking)</h2>

    <form action="/upload-nonblocking/" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">Upload File</button>
    </form>

    <a href="/" class="a">Switch to Blocking Upload →</a>

    {% if status %}
        <p class="msg">{{ status }}</p>
    {% endif %}
</body>
</html>
